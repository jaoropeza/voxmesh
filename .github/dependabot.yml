version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: nuget
    directory: /services/control-plane
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /services/ai/stt
    schedule:
      interval: weekly
    ignore:
      # pydantic pins pydantic-core 1:1 (==X.Y.Z); bumping core independently is
      # always ResolutionImpossible. It updates together with pydantic instead.
      - dependency-name: pydantic-core
      - dependency-name: pydantic_core
# Add ecosystems as they land: npm (apps/web, Phase 3+). Conan is not supported by
# Dependabot; C++ dependency bumps are manual and tracked via the license inventory.
