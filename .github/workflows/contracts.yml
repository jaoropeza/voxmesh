name: contracts

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buf:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          input: libs/contracts/proto
          lint: true
          format: true
          # Breaking-change detection against main enforces contract versioning
          # (voxmesh.<domain>.v1 → v2 for breaking changes).
          breaking: ${{ github.event_name == 'pull_request' }}
          breaking_against: >-
            https://github.com/${{ github.repository }}.git#branch=main,subdir=libs/contracts/proto
          push: false
