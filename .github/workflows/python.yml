name: python

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/ai/stt
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: services/ai/stt/constraints.txt
      - name: Install
        run: pip install -e .[dev] -c constraints.txt
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src tests
      - name: Pytest
        run: pytest -q
