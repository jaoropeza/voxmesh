syntax = "proto3";

package voxmesh.media.v1;

// One captured audio frame on the latency-critical streaming path
// (capture adapter -> gRPC -> media gateway -> streaming STT). Master prompt §12.
//
// Contract rules: this package is versioned; breaking changes require
// voxmesh.media.v2 or an explicit migration strategy. Never reuse field numbers.
message AudioFrame {
  string tenant_id = 1;
  string meeting_id = 2;
  string session_id = 3;
  // Which synchronized track this frame belongs to (original mic, original
  // speaker output, echo-cancelled mic, derived mix, derived STT stream).
  string track_id = 4;
  string participant_id = 5;
  // Meeting provider that produced the media ("teams", "meet", "zoom",
  // "desktop", ...). Identifies the ingress adapter only — provider-specific
  // schemas must not leak into this contract.
  string provider = 6;
  // Monotonically increasing per track. Gaps indicate loss and must be
  // accompanied by discontinuity = true on the next frame.
  uint64 sequence = 7;
  int64 captured_at_unix_ms = 8;
  // Monotonic clock timestamp used for cross-track alignment (ADR-0007).
  // Wall-clock time is metadata; this is the synchronization authority.
  int64 monotonic_timestamp_ns = 9;
  uint32 sample_rate_hz = 10;
  uint32 channels = 11;
  AudioEncoding encoding = 12;
  bytes payload = 13;
  // True when this frame does not butt seamlessly against the previous
  // sequence number on this track (device restart, dropped frames, inserted
  // silence). Consumers must not interpolate across it.
  bool discontinuity = 14;
}

enum AudioEncoding {
  AUDIO_ENCODING_UNSPECIFIED = 0;
  AUDIO_ENCODING_PCM_S16LE = 1;
  AUDIO_ENCODING_PCM_F32LE = 2;
  AUDIO_ENCODING_FLAC = 3;
  AUDIO_ENCODING_OPUS = 4;
}
